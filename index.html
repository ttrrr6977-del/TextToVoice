<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Voice Studio - Final Gender Fix</title>
    <style>
        :root { --accent: #2563eb; --bg: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .card { background: white; width: 100%; max-width: 500px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        #display-area { 
            width: 100%; min-height: 100px; padding: 15px; background: #f8fafc; 
            border: 1px solid #e2e8f0; border-radius: 12px; margin-bottom: 15px; 
            font-size: 18px; line-height: 1.6; white-space: pre-wrap;
        }
        .active-word { color: var(--accent); font-weight: bold; text-decoration: underline; }
        textarea { width: 100%; height: 60px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px; }
        .gender-nav { display: flex; gap: 10px; margin-bottom: 20px; background: #eee; padding: 5px; border-radius: 10px; }
        .gender-nav button { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: #666; transition: 0.3s; }
        .gender-nav button.active { background: white; color: var(--accent); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .play { background: var(--accent); color: white; }
        .stop { background: #64748b; color: white; }
        .info { font-size: 11px; color: #999; margin-top: 10px; display: block; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top:0">Voice Studio</h2>
    <textarea id="text-input" oninput="sync()">Hello Biraj, click Male or Female then press Play to hear the difference!</textarea>
    
    <div id="display-area"></div>

    <div class="gender-nav">
        <button id="m-btn" class="active" onclick="toggle('male')">Male Voice</button>
        <button id="f-btn" onclick="toggle('female')">Female Voice</button>
    </div>

    <div class="controls">
        <button class="btn play" onclick="speak()">▶ Play</button>
        <button class="btn stop" onclick="stop()">Stop</button>
    </div>
    
    <span class="info">Current Voice: <b id="v-name">Detecting...</b></span>
</div>

<script>
    const synth = window.speechSynthesis;
    let maleVoices = [];
    let femaleVoices = [];
    let selectedGender = 'male';

    function sortVoices() {
        const allVoices = synth.getVoices();
        maleVoices = [];
        femaleVoices = [];

        allVoices.forEach(v => {
            const name = v.name.toLowerCase();
            // Male Keywords
            if (name.includes('male') || name.includes('david') || name.includes('mark') || name.includes('alex') || name.includes('daniel') || name.includes('google us english')) {
                maleVoices.push(v);
            } 
            // Female Keywords
            else if (name.includes('female') || name.includes('zira') || name.includes('samantha') || name.includes('victoria') || name.includes('siri') || name.includes('karen')) {
                femaleVoices.push(v);
            }
        });
        
        // Update Label
        document.getElementById('v-name').innerText = (selectedGender === 'male' ? maleVoices[0]?.name : femaleVoices[0]?.name) || "Default";
    }

    // Trigger sorting
    synth.onvoiceschanged = sortVoices;
    sortVoices();

    function toggle(g) {
        selectedGender = g;
        document.getElementById('m-btn').className = g === 'male' ? 'active' : '';
        document.getElementById('f-btn').className = g === 'female' ? 'active' : '';
        
        // Show user which voice is loaded for that gender
        const currentList = g === 'male' ? maleVoices : femaleVoices;
        document.getElementById('v-name').innerText = currentList[0]?.name || "Not Found (Using Default)";
    }

    function sync() { document.getElementById('display-area').innerText = document.getElementById('text-input').value; }
    sync();

    function speak() {
        const text = document.getElementById('text-input').value;
        synth.cancel(); // Force Reset

        const utter = new SpeechSynthesisUtterance(text);
        
        // HARD FORCE GENDER
        if (selectedGender === 'male' && maleVoices.length > 0) {
            utter.voice = maleVoices[0];
        } else if (selectedGender === 'female' && femaleVoices.length > 0) {
            utter.voice = femaleVoices[0];
        }

        utter.onboundary = (event) => {
            if (event.name === 'word') {
                const p1 = text.substring(0, event.charIndex);
                const word = text.substring(event.charIndex, event.charIndex + event.charLength);
                const p2 = text.substring(event.charIndex + event.charLength);
                document.getElementById('display-area').innerHTML = `${p1}<span class="active-word">${word}</span>${p2}`;
            }
        };

        utter.onend = sync;
        synth.speak(utter);
    }

    function stop() { synth.cancel(); sync(); }
</script>

</body>
</html>
