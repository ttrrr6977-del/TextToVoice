<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Voice Studio - Fixed</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; }
        .card { background: white; width: 100%; max-width: 500px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        #display-screen { 
            width: 100%; min-height: 80px; padding: 15px; background: #f1f5f9; 
            border-radius: 12px; margin-bottom: 15px; font-size: 18px; line-height: 1.6;
            border: 1px solid #e2e8f0; white-space: pre-wrap;
        }
        .active-word { color: var(--primary); font-weight: 800; text-decoration: underline; }
        textarea { width: 100%; height: 60px; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 15px; resize: none; }
        .label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; color: #64748b; margin-bottom: 5px; }
        
        /* Fixed Gender Selection */
        .gender-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .gender-btn { 
            flex: 1; padding: 10px; border: 2px solid #e2e8f0; border-radius: 10px; 
            cursor: pointer; background: white; font-weight: 600; transition: 0.2s;
        }
        .gender-btn.active { border-color: var(--primary); color: var(--primary); background: #eff6ff; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; transition: 0.2s; }
        .btn-play { background: var(--primary); color: white; }
        .btn-stop { background: #f1f5f9; color: #64748b; }
        .btn-download { grid-column: span 2; background: #0f172a; color: white; margin-top: 10px; }
        input[type="range"] { width: 100%; accent-color: var(--primary); }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin:0 0 5px 0">Voice Studio</h2>
    <p style="font-size: 13px; color: #64748b; margin-bottom: 20px;">Select a gender and press play.</p>

    <span class="label">Input Text</span>
    <textarea id="text-input" oninput="sync()">Hi Biraj, let's test the Male and Female voices again!</textarea>

    <div id="display-screen"></div>

    <div style="display: flex; gap: 20px; margin-bottom: 15px;">
        <div style="flex: 1;">
            <span class="label">Gender</span>
            <div class="gender-box">
                <button id="m-btn" class="gender-btn active" onclick="setGender('male')">Male</button>
                <button id="f-btn" class="gender-btn" onclick="setGender('female')">Female</button>
            </div>
        </div>
        <div style="flex: 1;">
            <span class="label">Speed</span>
            <input type="range" id="speed" min="0.5" max="2" value="1" step="0.1">
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-play" onclick="play()">▶ Play</button>
        <button class="btn btn-stop" onclick="stop()">Stop</button>
        <button class="btn btn-download" onclick="download()">Download Audio</button>
    </div>
</div>

<script>
    const synth = window.speechSynthesis;
    let voices = [];
    let selectedGender = 'male';

    function loadVoices() {
        voices = synth.getVoices();
        console.log("Voices Loaded:", voices.length);
    }
    synth.onvoiceschanged = loadVoices;
    loadVoices();

    function setGender(g) {
        selectedGender = g;
        document.getElementById('m-btn').className = g === 'male' ? 'gender-btn active' : 'gender-btn';
        document.getElementById('f-btn').className = g === 'female' ? 'gender-btn active' : 'gender-btn';
    }

    function sync() { document.getElementById('display-screen').innerText = document.getElementById('text-input').value; }
    sync();

    function play() {
        const text = document.getElementById('text-input').value;
        if (!text) return;
        synth.cancel();

        const utter = new SpeechSynthesisUtterance(text);
        
        // BETTER VOICE FILTERING LOGIC
        const femaleNames = ['female', 'zira', 'samantha', 'victoria', 'google uk english female', 'siri', 'karen', 'moira'];
        const maleNames = ['male', 'david', 'mark', 'alex', 'google us english', 'google uk english male', 'daniel'];

        let targetVoice = voices.find(v => {
            const name = v.name.toLowerCase();
            const searchList = (selectedGender === 'female') ? femaleNames : maleNames;
            return searchList.some(keyword => name.includes(keyword));
        });

        // Fallback: If no gender-specific voice found, just pick the first available one
        utter.voice = targetVoice || voices[0];
        utter.rate = document.getElementById('speed').value;

        utter.onboundary = (event) => {
            if (event.name === 'word') {
                const part1 = text.substring(0, event.charIndex);
                const word = text.substring(event.charIndex, event.charIndex + event.charLength);
                const part2 = text.substring(event.charIndex + event.charLength);
                document.getElementById('display-screen').innerHTML = `${part1}<span class="active-word">${word}</span>${part2}`;
            }
        };

        utter.onend = sync;
        synth.speak(utter);
    }

    function stop() { synth.cancel(); sync(); }

    function download() {
        const text = document.getElementById('text-input').value;
        const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=en&client=tw-ob`;
        window.open(url, '_blank');
    }
</script>

</body>
</html>
